syntax = "proto3";

package kazakhexpress.product.v1;

option go_package = "github.com/maqsatto/kazakhexpress-proto/gen/go/kazakhexpress/product/v1;productv1";

service ProductService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc CreateProduct(CreateProductRequest) returns (Product);
  rpc GetProduct(GetProductRequest) returns (Product);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateStock(UpdateStockRequest) returns (Product);
  rpc ReserveStock(ReserveStockRequest) returns (Product);
  rpc ReleaseStock(ReleaseStockRequest) returns (Product);
  rpc AddProductImage(AddProductImageRequest) returns (ProductImage);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price_kzt = 4;
  int32 stock = 5;
  string image_url = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ProductImage {
  string id = 1;
  string product_id = 2;
  string object_name = 3;
  string url = 4;
  string created_at = 5;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  int64 price_kzt = 3;
  int32 stock = 4;
}

message GetProductRequest {
  string product_id = 1;
}

message ListProductsRequest {
  int32 limit = 1;
  int32 offset = 2;
  string query = 3;
}

message ListProductsResponse {
  repeated Product products = 1;
}

message UpdateStockRequest {
  string product_id = 1;
  int32 stock = 2;
}

message ReserveStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message ReleaseStockRequest {
  string product_id = 1;
  int32 quantity = 2;
}

message AddProductImageRequest {
  string product_id = 1;
  string filename = 2;
  string content_type = 3;
  bytes content = 4;
}
