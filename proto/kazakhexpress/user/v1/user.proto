syntax = "proto3";

package kazakhexpress.user.v1;

option go_package = "github.com/maqsatto/kazakhexpress-proto/gen/go/kazakhexpress/user/v1;userv1";

service UserService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc RegisterUser(RegisterUserRequest) returns (AuthResponse);
  rpc LoginUser(LoginUserRequest) returns (AuthResponse);
  rpc GetUser(GetUserRequest) returns (UserResponse);
  rpc GetUserByID(GetUserByIDRequest) returns (UserResponse);
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (AuthResponse);
  rpc Logout(LogoutRequest) returns (Empty);
}

message Empty {}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}

message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
  string address = 6;
  string created_at = 7;
  string updated_at = 8;
}

message RegisterUserRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  string phone = 5;
  string address = 6;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  User user = 1;
  string token = 2;
  string refresh_token = 3;
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserByIDRequest {
  string user_id = 1;
}

message UserResponse {
  User user = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string phone = 4;
  optional string address = 5;
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string user_id = 1;
  string access_token = 2;
  string refresh_token = 3;
}
